body:
  text: 正一威儀經忠一太上曰正一受道威儀初入道門詣師奉受劵契不受劵契土地山川守界眞官不上道名治官障礙稽留難爲成道受此劵契天地門戸不敢稽留正一受道威儀次當詣師奉受治籙三歸五戒不受之者則治司不書土地不明不攝五炁不關四司受此治籙則魔王拜伏自稱下官正一受道威儀次當詣師奉受仙靈符籙不受之者攝召不降神不營衞宣奏不逹有所謹按神不流行三界五帝不敬其形受此符籙齋戒啓奉伏鬼除魔先當使之正一受道威儀次當詣師奉受九州社令九州都統不受之者遊行九州所在山川土地神靈輒見稽留道路不通受此符籙鬼神敬奉不屬地司麾王衞形正一受道威儀次當詣師奉受斬邪符籙斬邪法籙不受之者魔精鬼祅横見干犯兵病所侵受之者誅邪伏凶萬神潜藏土地山川侍衞送迎正一受道威儀次當詣師奉受九宮捍戹六害神符不受之者九戹六害復犯子形六天兇鬼得肆其威受之者萬災不干百邪避之三界五帝奉子身形正一受道威儀次當詣師奉受九天兵符九天眞符不受之者三五神兵不隨子東西出入人間不來侍衞受之者三五神兵隨子東西出入侍衞萬邪不干役召神靈敢不敬從一切鬼神皆憚其威正一受道威儀次當詣師奉受天靈赤官元命符籙不受之者天神地祇不降爾身眞官散亂身神飛颺受之者天地兵馬隨爾所須身中吏兵纏繞其形坐卧安和夢想不驚正一受道威儀次當詣師奉受二十八宿七星符籙不受之者諸天星官不降爾身延年保命天官不依請召不降受之者名上天官保命延年祈請星官立依所言得道昇仙天門自開正一受道威儀次當詣師奉受都章畢印四部禁炁不受之者奏章行符禁制方術神炁不從關啓不聞受之者符章禁祝莫不如言正一受道威儀次當詣師奉受三百大章千二百官不受之者章中吏兵不受爾言徒爲謹按身反招愆受之奉行如神心言此至要愼勿輕傳依科修行無諸災患正一受道威儀次當詣師受紫宮大籙不受之者爲國消災正天分度天官不從受之勤行天應爾心所求所願諸天順從得道昇天星官下迎天門開通魔王保名正一受道威儀次當詣師奉受破魘籙不受之者神炁不行穢炁不消行符敕水召鬼束靈眞神迸散祅邪干形受之蕩穢人鬼清明正一受道威儀次當詣師奉受七十二戒百八十戒不受之者三界四司考罰爾身名削善簿字列罪科生死父母不免三塗受之奉行諸天稱慶鬼神所宗七祖生天身登雲宮正一受道威儀經戒符籙不詣師受行之不神反得偷盜之罪須詣師受依法修行略舉要領諸宜如之正一受道威儀凡欲受道先詣師門丹禱拜伏師許投辭請經戒符籙書寫如法齋糧質信法衣法物並備具巳然後登壇啓吿裂劵斷盟列辭自狀皆當揀日隔月不得頻繁及黙許易從正一受道威儀夫受道須詣有經戒符籙之師不得虚傳聲譽妄受眞經此道大禁魂考九幽正一受道威儀師無法不得妄授弟子拜請虚傳盟誓風刀萬劫七祖同辜切愼之焉正一受道威儀同姓九祖服從巳來不得傳授以爲師資所以者何師資犯約九祖同考正一受道威儀有法即師勿論奴僕下𨽻若身無戒籙天之上尊亦不得師尊法故也正一受道威儀登壇皆須立三師五保監臨授度檢察得失用對三天五帝之司正一受道威儀登壇付授巳便令弟子冠帶法服傳其位號弟子稱位號朝本師及太上十方也正一受道威儀受道畢以黄素書三師名諱形狀年幾及登壇三師五保與弟子正一受道威儀受道各依法位尊卑不得叨謬即俗人不得與清信弟子同坐清信弟子不得與清信道士同坐清信道士不得與止一道士同坐正一道士不得與高玄法師同坐高玄法師不得與洞神法師同坐洞神法師不得與洞玄法師同坐洞玄法師不得與洞眞法師同坐洞眞法師不得與大洞法師同坐登壇行道齋戒講說私房别室行住坐卧以此位號爲其尊卑上中下座宜相咨白請益決當自謙下敬重法教勿損威儀正一法服威儀受道先具法服玄冠絳褐黄裙帔䙱草履執笏傳授旣巳便當冠帶正一法服威儀法服不得用五色綾錦羅綺當以繒布制度如法常須清淨勿過三通正一法服威儀法服不得輒去身若浣濯替代勿令俗人犯觸混雜凡衣常有神男神女守䕶正一法服威儀法服不得假借當須自備若破壞任以火淨化之苦住山林靜處或埋𢉉之正一法服威儀法服脫著置清淨之處如詣厠溷把諸物皆先洗濯手足然後取之正一入靖威儀先整頓法服澡漱祝誦旋行唱讃並須如法不得隨宜吏兵謫言正一入靖威儀登壇入室臨事不得責罵於人及與外人交言左右迴顧執心不專正一入靖威儀靖中所須皆當預備不得臨時闕少呼外人求索正一入靖威儀入靖脫著履屨皆須面向經像不得迴背出入舉足隨其左右順其隂陽正一啓奏威儀西面平立執簡曲躬調聲正氣直詞小語樸略曲素勿得厲響繁飾正一啓奏威儀至心丹禱情訴懇惻隨事簡要勿失威儀爲己及人皆當一意不得惰慢正一啓奏威儀凡諸所請先自悔過然後請事言辭撙正情理須中勿多綺飾失其誠懇正一啓奏威儀初中後心皆當專一言辭准定事意齊同不得旦夕異陳初恭終慢正一讀經威儀冠帶祝漱捻香存念須依本文端身恭坐調柔聲氣至心誦讀從標至軸不得中停正一讀經威儀讀經須心心相繼念念不絶無中漏忘若誤言句却五百言畢啓謝自歎厥懷正一讀經威儀五百言若千言及章末輒許嚥液飲諸清水以利聲氣於法不虧正一讀經威儀畢卷若有事中起時收經入函韞三捻香禮拜還亦如之正一讀經威儀先當洗手熏手及經然後讀之竟復斂淨洗手不得正爾便行正一讀經威儀讀經皆先就師受其音㫖句度諳識文字不得經堂之中臨事交錯諠亂衆人正一讀經威儀讀經之時不得受人借問文句意義及爲人解說問難處分他事雜亂眞靈正一讀經威儀經中不了須有諮訣及問文字句度皆當别時就師拜請勿得隨宜輒則諮求正一講經威儀弟子先當諮白法師爲某等若男女若某事請於某處講說某經願見開悟正一講經威儀法師許巳裝嚴高座於講堂中百座千座皆當如法威儀可觀正一講經威儀安置髙座東西南北隨其所宜左經右師男東女西勿令混雜失其威儀正一講經威儀如意几拂香鑪函韞經案巾帕旛華帳蓋敷張牀席悉須如法不得隨宜正一講經威儀弟子聽衆各持香華旛幢音樂唱讃導引燒香禮拜迎請法師隨時來徃不得闕怠正一講經威儀法師隨事爲諸道俗懴悔禮願受戒持齋時時勸化使悟道眞弘道利物於此爲先正一講經威儀法師以講經功德裝嚴國主人王大臣宰輔土地官長人民品物五苦三塗一切衆生悟道成眞正一講經威儀講經畢弟子及諸聽衆一切有心隨分發意建大寳齋福被無邊正一事師威儀旦夕正其法服執簡朝本師三師如父母禮若同居住晨昏省覲和顔恱色正一事師威儀逺師百里一月一省二百里三月五百里已上一年若師有疾病老劣他故不依此限書䟽無限正一事師威儀省師皆自齎糧食所須香油之屬悉不得損耗於師正一事師威儀弟子以時賞師衣服藥物几杖巾拂履屨瓶器米麥果菜供其所須勿使乏少正一事師威儀師有疾病災戹供侍左右爲建功德燒香禮懴放生贖命延年度戹設齋行道正一事師威儀師亡持服百日心喪三年殯諸山林几棺布囊舉尸而巳造衆福田思念容止正一奉齋威儀爲己及人建諸齋福皆須精志所有米麥並須清凈不得假換私竊非義等物正一奉齋威儀凡爲吉凶生死福業先當脩齋造一切功德成就日皆須設齋慶喜正一奉齋威儀凡齋皆有三界五帝四司靈官監察其所供齋用不得汙穢偷竊正一奉齋威儀登齋供施若貴若賤若老若少皆當平等不得生諸二心起愛憎念正一奉齋威儀所請齋官隨分施散名爲買福不得口許心悔生不均意起怠慢想正一奉齋威儀齋官起供依位行列啓吿陳請各稱名位不得交互須依次第吿知勿使偏併不平正一奉齋威儀主人列辭具陳事意詣請投辭法師受䟽依名吿赴不得違越失時更受便近家供正一奉齋威儀齋官隨分食巳餘便折還主人不得將歸清淨衆食亦不得啖各宜愼之正一奉齋威儀八解十直甲子庚申本命八節吉辰皆宜持齋三界五帝四天十部悉來監臨正一受誡威儀三戒五戒六戒九戒十二可從戒二十七戒四十六戒七十二戒八十戒百二十戒三百戒各依法受持正一受戒威儀若國主人王大臣宰輔人民男女及以鬼神一切衆生各隨分授與敕護戒神官使其營衞萬災不干正一受戒威儀持戒之人不得與非持戒人同牀共席行住坐卧飲食居止衣服履屨車輿几杖皆宜異之正一懴侮威儀旦夕朝眞登壇入靖讀經禮拜先當懴悔國主人王大臣宰輔土地官長父母師尊三塗五苦一切衆生後及已身正一懴悔威儀行住坐卧舉心運意三業六根故誤成罪猶如沙塵注心懴悔後心不生一切清淨萬罪消除正一禮拜威儀入靖朝眞行住坐卧若心及形禮拜五億諸天十方世界眞應化法無量天尊仙眞聖衆正一禮拜威儀動心運形歸依虚空微塵沙數過去未來見在三世無極大道大身小身無量等身一切敬禮正一禮拜威儀上自大羅下窮無際十方三界大道應化說法演教三十六部眞法化法外藏内藏符圖寳經普起歸依正一燒香威儀先當洗拭香奩鑪挾匙盤灰炭等具然後裝治平正瑩淨火不見赤法則可觀正一燒香威儀所有灰炭火等皆當别貯不得以竈下爨餘及不淨柴薪葷穢非法處灰火正一燒香威儀凡是捻香皆須三指端身正意坐立宜就取便三指捻之毎當三獻使煙氣相續不得中停正一燒香威儀祈吿啓請入靖登壇使晝夜相續勿令斷絶而神道無形寄香氣宣通正一燒香威儀凡諸讀經行道齋戒禮誦講說祈吿皆先行香三周然後列辭正一燒香威儀上界天香千名萬號不焚自熏迎風隨雲周徧十方下界凡境任世有無衆事之中唯此難闕正一然燈威儀燈象星形助天光明延年續命却禍消災一燈十燈百燈千燈萬萬億燈在時所能正一然燈威儀行道讀經禮拜講說周繞壇座如環列星一萬二千應天之精晝没夜明順炁修行正一然燈威儀然燈去地三尺作籠蓋之勿使飛蟲得入及絶風塵飄汙正一鳴鐘威儀鐘者威儀寳器四衆所聽六時急務不可闕也左鐘右經皆置臺閣舉之正一鳴鐘威儀若二時三時六時九時十二時皆須整頓衣服洗手潄口調正身心先叩齒誦呪然後打之正一鳴鐘威儀打鐘法先須穊漸踈徐打三槌上謂之三下後先穊漸踈徐打二十四槌穊之謂之長行復初漸穊徐打十二槌謂之終合三十九槌以應三十九戸正一鳴鐘威儀三下鐘安致燈火整飾席座澡漱冠帶悉須如法𠊱打長鐘徐徐舉岀之衆㑹所依位行列香華賛引並宜齊整待後起鍾唱導舉聲行不得臨時迫迮失其威儀正一鳴鍾威儀不得失時及非法打擊若非時集衆别立小鐘正一鳴磬威儀以止節登壇入室威儀所須每禮拜稱善初終導引俯仰節度齋講坐起皆當擊之正一章奏威儀章法最難愼不得輕紙墨令淨辭狀正直須合眞氣勿使謬妄吏兵陳論正一章奏威儀拜章面向隨其所申皆當别立席座巾案如法低身小坐平聲讀之勿得高傲不恭正一章奏威儀不受治籙千二百官君三百六十大章都章畢印皆不合奏章出官各出身中仙官不得謬濫正一醮請威儀醮者祈天地神靈之享也亦有多種所有餅果並須清潔不得肉脯葷穢天官不祐正一醮請威儀所𧵥信物不得假借闕少不充欺誑明靈事畢施散山棲道士饑寒老病囚徒役人正一醮請威儀事畢所設餅果食訖餘皆埋之正一醮請威儀當夜半已後日中之前生氣之時正一醮請威儀所用餅果並須芳新不得經宿及生産尸穢家鳥䑕食餘則神靈不歆徒失爾功正一法具威儀道士法具香鑪澡灌几拂如意環珮劒杖當常整飾安置供養隨事所須正一食器威儀道士食器三重匙挾巾帕並須如法不得用金銀寳玉牙角雕鏤混雜凡器常須清淨正一器用威儀道士器用漱盤衆生食盤注留澡盆擣香臼杵合藥釡甑隨事所宜不可假借正一居處威儀道士居處樸素虚淨内外開通勿張帳慢簾幌屏障之屬遮擁左右正一居處威儀道士居處卑房小室容身而已不得高堂廣屋雕畫赭堊華麗顯敞正一居處威儀道士居處依壁敷牀不得前後合鋪坐卧獨居勿同諸凡人正一居處威儀道士居處藜牀布被藁席蒲蓋繩牀夾漆木盤瓦器不得用銅鐵金銀正一卧具威儀布單布被枕石木屨及裙襦衫袴皆當繒布染作荆黄栀子竹葉黄屑壞色正一屨履威儀作山形二儀皮布縵飾不得五色錦綺裝禠若草屨木履皆須異俗勿雜世凡正一泉井威儀道士居住先須井泉常使清淨勿令六畜雜物汙穢皆别立泉井浣濯飲食牛馬畜産正一井泉威儀凡諸泉井須數淘泄勿使草木華葉蛙蠅落中人家客院各立井泉無雜供齋所用正一用水威儀凡諸造食煎炊藥物洗浣衣服沐浴澡潔所須用水皆立濾器令甚細宻先當濾之正一飲食威儀道士飲食滿腹而已勿求精細常當奉齋非時非法悉不得食正一飲食威儀道士常當受食呪施出種種食别安器中存見三一與形俱食以挾三擊器就食别器布散衆生正一飲食威儀道士各立齋器巾挾當清淨日供所須不得與人同器共食及給他用穢炁混雜正一飲食威儀道士飲食不得使人穢觸所食之物不得臨上令口氣衣服汙穢餘便施散不得積聚將歸正一飲食威儀道士食訖乞懴然後施散不得中舉乞人及使僕侍從雞狗之流監齋眞官皆見謫罰名書三官正一動止威儀道士行住坐卧皆當合道正容斂色端直其身不得傾斜失其儀相威儀先首可不愼之正一遊行威儀道士遊詣府署省侍師尊教化人間齋請入俗五人三人皆當依法痒序正其容儀不得交雜軌則有失正一遊行威儀道士遊詣人間及赴齋講各持座褥隨處自居旣限穢氣又别尊卑上中下座大小同制正一住觀威儀道士旣入道訖即須住觀持護法相旦夕燒香朝眞禮懴奉侍師尊受持禁戒諮問太德學道方法正一住觀威儀更相教誨自惜法身修善止惡存念三寳慈惠和柔每事恭順成就道場外人干犯皆當念忍正一往觀威儀上下和睦尊卑信順如運手足存立常住香油米麥樵菜等物相共營求皆同一已不得費用正一住觀威儀莊田碾磑家人使役五行什物六畜器具果木華藥一切所須皆共愛惜供養十方當來福田正一住觀威儀尊像經法旙華帳座堂殿樓閣牀席氈褥鍾磬几拂常共建立悉使精華無令闕少正一往觀威儀常住衆物及三寳財草葉華果毫芥巳上不得輒自費用及以乞人其罪至重死入三塗過去未來見在三世已身父母兄弟姊妹及其子孫貧窮下賤聾盲瘖瘂風癩愚癡瘨狂攣躃水火兵傷正一死亡威儀若師尊同學亡打鐘三百六十槌告終法徒畢集哭泣三聲燒香讀經曁其藏殮依用法式正一死亡威儀几棺布囊舉尸送山林藪澤入土而巳不得立墳封𣗳丘壠正一死亡威儀正一符籙劵契環劒布囊盛之隨身入土正一死亡威儀書七十二符安佩尸形如法拜戊己章棺殮章法服隨身正一死亡威儀亡師所有衣物牀卧等具資送之餘脩牒名目施入常住若親若踈若内若外皆不得犯正一死亡威儀師若無財物資送當用常住及齋供福田並以衆物所以生死同依常住師天尊也太上謂天師道陵曰凡一百三十二條正一威儀昔在龍漢劫終於玉清三華便殿詣師元始天尊奉受是時元始天尊對太上道君九天眞師元始丈人三十二天帝五老上眞無極神王命五帝玉童披九雲之韞出此威儀分付與我曰子當流布三界十方無極世界一切男女有善心者皆傳與之吾得巳來經今五劫隨處教化徧滿人天上聖眞仙悉皆奉受書之金簡祕諸天官今應授子汝其遵崇敬則福至泄則禍臻元始明戒宜愼之焉道陵稽首禮謝曰臣入證未久屢遭慈霈教誨慇懃賜授經法不測深淺更示科戒微妙難思敢不盡心依科奉行於是諸天聖衆同聲稱善俱入太空正一威儀經
